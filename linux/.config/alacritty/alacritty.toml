[font]
size = 15.0

[font.bold]
family = "Hack Nerd Font"
style = "Bold"

[font.bold_italic]
family = "Hack Nerd Font"
style = "Bold Italic"

[font.italic]
family = "Hack Nerd Font"
style = "Italic"

[font.normal]
family = "Hack Nerd Font"
style = "Regular"

[window]
dynamic_padding = true
opacity = 0.5

[window.padding]
x = 2
y = 2

[general]
import = ["~/.config/alacritty/catppuccin.toml"]
